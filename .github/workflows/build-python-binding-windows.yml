# 在 Windows 上构建 ElaWidgetTools 的 PySide6 6.10.3 Python 绑定
# 矩阵构建 Python 3.9 / 3.10 / 3.11 / 3.12，产出 .pyd 模块供下载

name: Build Python Binding (Windows)

on:
  push:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'ElaWidgetTools/**'
      - 'bindings/**'
      - '.github/workflows/build-python-binding-windows.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'ElaWidgetTools/**'
      - 'bindings/**'
      - '.github/workflows/build-python-binding-windows.yml'
  workflow_dispatch:

env:
  QT_VERSION: 6.10.3
  PYSIDE6_VERSION: 6.10.3
  BUILD_TYPE: Release

concurrency:
  group: build-python-win-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows / Python ${{ matrix.python-version }} / PySide6 6.10.3
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        id: py
        with:
          python-version: ${{ matrix.python-version }}

      - name: 验证 Python 版本
        shell: bash
        run: |
          PYTHON="${{ steps.py.outputs.python-path }}"
          echo "Python path: $PYTHON"
          "$PYTHON" --version
          "$PYTHON" -c "import sys; print('exec:', sys.executable)"

      - name: 安装 PySide6 / shiboken6 / shiboken6_generator ${{ env.PYSIDE6_VERSION }}
        shell: bash
        run: |
          PYTHON="${{ steps.py.outputs.python-path }}"
          "$PYTHON" -m pip install --upgrade pip
          "$PYTHON" -m pip install \
            "PySide6==${{ env.PYSIDE6_VERSION }}" \
            "shiboken6==${{ env.PYSIDE6_VERSION }}" \
            "shiboken6_generator==${{ env.PYSIDE6_VERSION }}"

      - name: 安装 Qt ${{ env.QT_VERSION }} (win64_msvc2022_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          host: windows
          target: desktop
          cache: true
          cache-key-prefix: qt-${{ env.QT_VERSION }}-win64_msvc2022_64

      - name: 查询环境路径并写入 GITHUB_ENV
        id: env
        shell: bash
        run: |
          set -euo pipefail
          PYTHON="${{ steps.py.outputs.python-path }}"
          echo "PYTHON_EXE=$PYTHON" >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=$QT_ROOT_DIR" >> "$GITHUB_ENV"
          PY_SITE=$("$PYTHON" -c "import site; print(site.getsitepackages()[0])")
          SHIBOKEN_DIR=$("$PYTHON" -c "import shiboken6,os;print(os.path.dirname(shiboken6.__file__))")
          PYSIDE6_DIR=$("$PYTHON" -c "import PySide6,os;print(os.path.dirname(PySide6.__file__))")
          echo "PY_SITE=$PY_SITE" >> "$GITHUB_ENV"
          echo "SHIBOKEN_DIR=$SHIBOKEN_DIR" >> "$GITHUB_ENV"
          echo "PYSIDE6_DIR=$PYSIDE6_DIR" >> "$GITHUB_ENV"
          echo "--- Qt root ---"; ls "$QT_ROOT_DIR" | head
          echo "--- PySide6 cmake ---"; ls "$PYSIDE6_DIR/lib/cmake/PySide6" | head
          echo "--- ElaWidgetTools dir ---"; ls -d ElaWidgetTools/ && echo "ElaWidgetTools exists"

      - name: 替换 bindings.xml 中的硬编码 PySide6 glue 路径
        shell: bash
        run: |
          set -euo pipefail
          PYSIDE6_GLUE_DIR="${PYSIDE6_DIR}/glue"
          PYSIDE6_GLUE_DIR_FWD=$(echo "$PYSIDE6_GLUE_DIR" | sed 's|\\|/|g')
          echo "PySide6 glue dir: $PYSIDE6_GLUE_DIR_FWD"
          ls "$PYSIDE6_GLUE_DIR" | head
          sed -i "s|/Users/cyber/miniconda3/envs/aidub/lib/python3.10/site-packages/PySide6/glue|$PYSIDE6_GLUE_DIR_FWD|g" bindings/bindings.xml
          echo "--- 替换后的 inject-code 行 ---"
          grep "inject-code.*glue" bindings/bindings.xml

      - name: CMake configure + build (MSVC + Ninja)
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          echo --- ElaWidgetTools dir check ---
          dir ElaWidgetTools
          echo --- CMake configure ---
          cmake -S . -B build-python -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" ^
            -DPython3_EXECUTABLE="%PYTHON_EXE%" ^
            -DShiboken6_DIR="%SHIBOKEN_DIR%/lib/cmake/Shiboken6" ^
            -DPySide6_DIR="%PYSIDE6_DIR%/lib/cmake/PySide6" ^
            -DBUILD_PYTHON_BINDINGS=ON
          echo --- CMake build ---
          cmake --build build-python --target ElaWidgetToolsPython --parallel

      - name: 复制 .pyd 到 site-packages
        shell: bash
        run: |
          set -euo pipefail
          echo "--- 查找构建产物 ---"
          ls -lh build-python/bindings/ElaWidgetTools*.pyd
          echo "--- 复制到 site-packages ---"
          cp build-python/bindings/ElaWidgetTools*.pyd "${PY_SITE}/"
          echo "--- 验证 ---"
          ls -lh "${PY_SITE}"/ElaWidgetTools*.pyd

      - name: 冒烟测试 (import)
        shell: bash
        run: |
          PYTHON="${{ steps.py.outputs.python-path }}"
          "$PYTHON" - <<'PY'
          import sys
          sys.path.insert(0, r"${{ env.PY_SITE }}")
          import PySide6.QtWidgets  # 确保 Qt DLL 路径已注册
          import ElaWidgetTools as E
          print("ElaWidgetTools loaded:", E.__file__)
          for name in ["ElaWindow","ElaMessageBar","ElaIconType","ElaNavigationRouter"]:
              assert hasattr(E, name), f"missing: {name}"
          print("smoke test passed")
          PY

      - name: 打包 .pyd 到 dist/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${PY_SITE}"/ElaWidgetTools*.pyd dist/
          ls -lh dist/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ElaWidgetTools-windows-py${{ matrix.python-version }}-pyside${{ env.PYSIDE6_VERSION }}
          path: dist/*
          retention-days: 30
          if-no-files-found: error

  release:
    name: 发布到 GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: 下载 artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 打包为 zip
        run: |
          set -euo pipefail
          mkdir -p dist
          cd artifacts
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -r "../../dist/${name}.zip" .)
          done
          cd ..
          ls -lh dist/

      - name: 用日期生成 Windows tag 并清理同日旧 release
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="py-win-v$(date -u +%Y.%m.%d)"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "存在同日 Windows release $tag，删除以重建"
            gh release delete "$tag" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: |
            自动构建 Python 绑定 (Windows) — 提交 `${{ github.sha }}`

            平台：Windows (win64_msvc2022_64)
            Python：3.9 / 3.10 / 3.11 / 3.12
            PySide6：${{ env.PYSIDE6_VERSION }}
            Qt：${{ env.QT_VERSION }}

            将对应 Python 版本的 zip 解压后把 `ElaWidgetTools.*.pyd` 放入对应 Python 的 site-packages 即可 `import ElaWidgetTools`。
            Windows 上需确保先 `import PySide6` 再 `import ElaWidgetTools`（或 PySide6 已在搜索路径中）。
          fail_on_unmatched_files: true
          files: dist/*.zip
